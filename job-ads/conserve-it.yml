ad_raw: |
  Conserve It is looking for a Graduate Software Developer to join our Niagara
  Applications Development team. The successful applicant will collaborate with
  other Developers, Data Scientists and Engineers to design and implement
  innovative solutions for real-time optimisation of live equipment in the built
  environment.

  Reporting to our Team Lead: Niagara Applications, the successful candidate will
  be working on the development of our flagship PlantPRO product and related
  technologies.

  Tasks and responsibilities include:
  - Design and develop new software modules and applications in line with internal
    and external stakeholder requirements
  - Maintain and improve existing software modules and applications to deliver
    high quality software
  - Design and implement new software modules using standard software design
    documentation techniques and known software development tools
  - Troubleshoot and fix problems and bugs with existing software modules
  - Update product documentation where required for new features and releases
  - Implement improvements to existing software modules as identified by internal
    and external stakeholders
  - Document and execute test plans and participate in software release testing
  - Participate in project and development planning meetings
  - Use and contribute to the use of project planning, issue tracking and software
    documentation tools
  - Any other tasks as directed

  Essential skills and experience
  - Solid grounding in Object Oriented Design and Development
  - Demonstrable programming experience and/or skills in: Java or C++
  - Demonstrable programming experience and/or skills in: JavaScript with a strong
    understanding of React and Typescript
  - Ability to translate a design or mathematical model into code
  - Understanding of developing software models to reflect real world entities
  - Development of multi-threaded systems and general understanding of the use of
    application frameworks
  - Working with agile methodologies in building CI/CD pipelines
  - Bachelor of Computer Science or equivalent

  Desirable skills
  - Test Driven Development techniques
  - Exposure to standard tools such as Git, Gradle, Maven and the Atlassian suite
  - Jenkins CI/CD platforms
  - Understanding the impact of inefficient code, and when/where to optimise
  - Embedded Software development
  - Debugging tools to analyse and diagnose code
  - Understand the rendering pipeline of React
  - Understanding of the hardware/software interface
  - Analysis and troubleshooting of software systems
  - Understanding of RS485 and RS232 communications protocols
  - Master of Computer Science or equivalent
  - Experience using build tools to both compile and deploy products

  Bonus
  - Experience or exposure to Tridium's Niagara Framework
  - Knowledge of Building Automation/Management Systems, Chiller Plants and Chillers
  - Knowledge of control and automation systems

