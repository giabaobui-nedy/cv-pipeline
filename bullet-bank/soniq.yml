# SONIQ Digital — Bullet Bank
# Role: Junior Software Engineer, Feb 2026 – Present, Richmond VIC.
#
# Each entry has:
#   id    — stable identifier referenced from job-ad specs
#   tags  — free-form theme tags, used to grep relevant bullets per ad
#   text  — LaTeX-ready content (goes inside \resumeItem{...})

bullets:
  - id: soniq-overview
    tags: [react, aws, microservices, event-driven, saas, overview]
    text: >-
      Contributing to frontend (React) and backend services (microservices-based and event-driven)
      within a production digital signage and content management platform (CMS) operating in a
      cloud-native AWS environment as a SaaS product.

  - id: soniq-fullstack-debugging
    tags: [debugging, production, fullstack, reliability, meta]
    text: >-
      Diagnosed and resolved production issues across frontend and backend systems, ensuring
      reliability and minimal disruption to live digital signage deployments.

  - id: soniq-collaboration
    tags: [collaboration, communication, requirements, stakeholders, microservices, meta]
    text: >-
      Collaborated with product managers and engineers to define system requirements, workflows,
      and edge cases across multiple features in a distributed microservice environment.

  - id: soniq-media-transcoding
    tags: [backend, media, pipeline, optimization, legacy]
    text: >-
      Designed and implemented a media transcoding pipeline to automatically convert 4K video
      assets into optimised Full HD outputs for a legacy CMS, improving playback compatibility
      and reducing asset delivery overhead across client deployments.

  - id: soniq-responsive-redesign
    tags: [frontend, responsive, css, ui, refactoring]
    text: >-
      Delivered a responsive redesign across multiple web pages by introducing mobile-first layout
      adjustments and reusable UI patterns, improving cross-device consistency and reducing
      duplicated styling logic.

  - id: soniq-aws-analysis-ts-migration
    tags: [aws, typescript, migration, architecture, analysis]
    text: >-
      Analysed and visualised existing AWS infrastructure and service interactions to support
      a large-scale TypeScript migration (.js $\rightarrow$ .ts, .jsx $\rightarrow$ .tsx),
      improving type safety and long-term maintainability.

  - id: soniq-architecture-docs
    tags: [documentation, architecture, microservices, onboarding]
    text: >-
      Authored comprehensive technical documentation and system architecture diagrams for a
      complex microservice ecosystem, formalising design patterns and service flows to streamline
      engineering onboarding.

  - id: soniq-jira-workflow
    tags: [agile, delivery, team, jira]
    text: >-
      Improved delivery workflow by restructuring Jira epics into smaller, iterative tasks,
      increasing progress visibility and supporting more continuous delivery practices within
      the team.

  - id: soniq-subscription-tier
    tags: [microservices, backend, saas, entitlement]
    text: >-
      Implemented subscription-tier enforcement across distributed microservices by fixing
      entitlement inconsistencies, ensuring reliable behaviour for free-tier users across
      interconnected services.

  - id: soniq-scheduling-defect
    tags: [debugging, backend, production, testing, timezone, ci-cd]
    text: >-
      Investigated and resolved a production scheduling defect where enabling monthly recurrence
      caused timeline events to disappear, reproducing the issue through targeted test scenarios,
      which were later integrated into the CI/CD pipeline, and correcting timezone-sensitive
      scheduling logic.

  - id: soniq-device-protocol-migration
    tags: [iot, cloud, migration, realtime, backend]
    text: >-
      Engineered the migration of device communication protocols to a modern cloud-native
      synchronisation service, improving real-time data reliability and system scalability
      across distributed signage displays.

  - id: soniq-portrait-landscape
    tags: [frontend, responsive, css, iot]
    text: >-
      Implemented responsive layout support for portrait (1080$\times$1920) and landscape
      (1920$\times$1080) digital signage displays, ensuring consistent rendering across
      different screen orientations used in real-world deployments.

  - id: soniq-qa-debugging
    tags: [debugging, qa, production, reliability, ux]
    text: >-
      Participated in debugging and resolving production issues as reported during QA, ensuring
      system reliability and minimal disruption to live deployments and improving UX.

  - id: soniq-hubspot-lambda
    tags: [aws, lambda, serverless, integration, crm]
    text: >-
      Engineered a scalable user inquiry and notification routing service using AWS Lambda,
      integrating with HubSpot CRM to automate and streamline customer feedback workflows.

  - id: soniq-cost-optimisation
    tags: [aws, lambda, eventbridge, serverless, cost, impact-metric]
    text: >-
      Designed and deployed an event-driven infrastructure scheduling service (AWS Lambda + EventBridge)
      to automatically shut down non-production environments, reducing development costs by
      \textbf{10--12\%} and staging costs by \textbf{33\%} through time-based optimisation.

  - id: soniq-data-integration-redesign
    tags: [architecture, serverless, analysis, cost]
    text: >-
      Analysed an existing data integration architecture and proposed a simplified serverless
      alternative to achieve eventual consistency while reducing system complexity and
      infrastructure cost.

  - id: soniq-ts-frontend-architecture
    tags: [typescript, frontend, react, architecture, refactoring, leadership, state-management, tanstack]
    text: >-
      Led a TypeScript migration and architected a scalable frontend system: standardised core
      React Context providers (authentication, theme, layout) for cross-cutting state management,
      and established a layered data-flow pattern (DTO $\rightarrow$ mapper $\rightarrow$ domain
      $\rightarrow$ API $\rightarrow$ TanStack $\rightarrow$ manager/state hook) enforcing
      separation of concerns and strict type-safe boundaries.

  - id: soniq-architectural-validation
    tags: [tooling, architecture, quality, ai-assisted]
    text: >-
      Built automated validation tooling to enforce architectural constraints, reducing coupling
      and ensuring consistent code quality, particularly for AI-assisted development.

  - id: soniq-shopify-eventbridge
    tags: [aws, eventbridge, sqs, event-driven, integration, saas, onboarding]
    text: >-
      Implemented an event-driven integration pipeline connecting Shopify webhooks to internal
      microservices (EventBridge + SQS), enabling automated CMS trial activation flows and reducing
      customer onboarding friction between hardware purchases and software usage.

  - id: soniq-shopify-trial-requirements
    tags: [requirements, stakeholders, communication, collaboration, ux, backend, frontend, saas]
    text: >-
      Conducted a structured discovery phase with the managing director and engineering team
      to surface business context, define feature scope, and align on UX constraints and
      implementation best practices for a Shopify-to-CMS trial activation system — converting
      ambiguous requirements into a clear specification before development began.

  - id: soniq-stripe-trial-activation
    tags: [stripe, backend, billing, saas, entitlement, integration, reliability]
    text: >-
      Implemented a no-payment Stripe trial subscription activation flow within the billing
      service, creating a Business Tier trial subscription at claim time without capturing
      payment details, and engineered deterministic idempotency key handling to safely
      prevent duplicate Stripe customer creation between the signup and activation flows.

  - id: soniq-activation-claim-page
    tags: [frontend, react, ux, ui, fullstack, saas, onboarding]
    text: >-
      Designed and built the CMS activation claim page and end-to-end customer claim flow,
      handling token validation, authentication round-trips, account eligibility
      enforcement, and trial confirmation UI — connecting Shopify hardware purchasers to
      an active CMS Business Tier trial in a single email-driven interaction, successfully
      deployed to the development environment.

  - id: soniq-claude-code-jira
    tags: [ai-assisted, agentic, tooling, jira, coordination, planning]
    text: >-
      Leveraged Claude Code with Jira MCP connectors to translate post-discussion
      engineering decisions into structured, PR-ready implementation plans with
      sequenced Jira tasks and delivery timelines, preserving decision context
      and enabling clearer team coordination.

  - id: soniq-event-propagation-debug
    tags: [debugging, event-driven, microservices, backend, aws, observability]
    text: >-
      Diagnosed a silent CMS activation failure while end-to-end testing as a newly onboarded
      customer --- hardware purchased on Shopify, activation code received, claim flow silently
      non-functional --- inspecting CloudWatch logs across the billing and IAM microservices to
      trace the root cause to a JWT minter re-architecture that renamed the IAM identity-sync
      event topic, severing billing's subscription and blocking customer identity from syncing,
      then updated the billing service's event subscription and flagged event topic renames as
      a contract-breaking class requiring explicit versioning.

  - id: soniq-event-propagation-debug-compact
    tags: [debugging, event-driven, microservices, backend, aws, observability, incident-response]
    text: >-
      Diagnosed a silent production activation failure by tracing CloudWatch logs across the
      billing and IAM microservices to a renamed event topic that had severed a service
      subscription --- restored the subscription and flagged event-topic renames as a
      contract-breaking change requiring explicit versioning.

  - id: soniq-device-grouping
    tags: [fullstack, frontend, backend, react, fastapi, typescript, feature-delivery, ai-assisted]
    text: >-
      Delivered an end-to-end device grouping feature: extended the FastAPI data model with a
      group association field, built group CRUD and bulk assign/unassign APIs, and shipped the
      complete React UI --- a GroupsRail filter lens, color-coded GroupChip primitives, contextual
      action bars, bulk multi-select, and a React Table--based device grid redesign.

  - id: soniq-fallback-content
    tags: [backend, frontend, react, fastapi, scheduling, saas, reliability]
    text: >-
      Implemented a priority-based content fallback system: removed server-side conflict checking,
      built event-priority playback resolution and a per-schedule dedicated fallback field
      (FastAPI), and delivered the schedule editor UI --- event priority selector, fallback-create
      affordance with informational banner, and soft-warning dialog for overlapping events.

  - id: soniq-frontend-design-system
    tags: [frontend, react, typescript, ui, design-system, refactoring, architecture]
    text: >-
      Authored a production-ready frontend design-system layer: established Apple-inspired semantic
      type and colour token systems, standardised control and icon sizes via CVA, extracted shared
      presentational primitives (Badge, EmptyState, StatusDot, list shell), and built opinionated
      form layout components (Field, Stack) to enforce consistent visual hierarchy across the
      codebase.

  - id: soniq-hospital-app-accessibility
    tags: [frontend, aws, accessibility, ui, client-delivery]
    text: >-
      Delivered UI improvements and accessibility upgrades for a client-facing hospital directory
      application (AWS Amplify): applied WCAG colour-contrast best practices, introduced
      alternating-row colour coding for readability, standardised typography and spacing across
      multi-level directory views, and added touch-interaction affordances --- driven by iterative
      client and management feedback.

  - id: soniq-outbox-pipeline-migration
    tags: [aws, eventbridge, fargate, microservices, event-driven, cost, architecture, impact-metric]
    text: >-
      Cut cross-service event-publishing infrastructure cost by re-architecting the
      transactional-outbox pipeline --- eliminating a managed DMS $\rightarrow$ Kinesis
      $\rightarrow$ Lambda fan-out that alone consumed \textbf{$\sim$36\%} of total monthly
      non-production cloud spend --- by relocating the poller to a sidecar on each microservice's
      underutilised Fargate task and centralising the polling and EventBridge \texttt{PutEvents}
      logic into a shared library.

  - id: soniq-stack
    tags: [stack, typescript, react, nestjs, python, fastapi, aws, docker, ci-cd, tailwind, vite]
    text: >-
      \textbf{Stack:} \emph{TypeScript, React, Tailwind CSS, Vite, NestJS, Python (FastAPI), AWS,
      Docker, Git/GitHub, CI/CD, GitHub Actions.}
